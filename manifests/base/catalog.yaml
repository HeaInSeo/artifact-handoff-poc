apiVersion: v1
kind: Service
metadata:
  name: artifact-catalog
  namespace: artifact-handoff
spec:
  selector:
    app: artifact-catalog
  ports:
    - name: http
      port: 8090
      targetPort: 8090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: artifact-catalog
  namespace: artifact-handoff
spec:
  replicas: 1
  selector:
    matchLabels:
      app: artifact-catalog
  template:
    metadata:
      labels:
        app: artifact-catalog
    spec:
      containers:
        - name: catalog
          image: python:3.12-alpine
          command: ["python", "/app/catalog.py"]
          ports:
            - containerPort: 8090
              name: http
          env:
            - name: PORT
              value: "8090"
            - name: STATE_FILE
              value: /data/catalog.json
          volumeMounts:
            - name: app
              mountPath: /app
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8090
      volumes:
        - name: app
          configMap:
            name: catalog-code
        - name: data
          emptyDir: {}
